[project]
name = "speekify"
version = "0.1.0"
description = "TUI URL/text to WAV converter powered by Supertonic v3"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "supertonic>=1.3.1",
  "textual>=0.89",
  "httpx>=0.27",
  "trafilatura>=1.9",
  "langdetect>=1.0.9",
  "sentencepiece>=0.2",
  "torch>=2.8",
  "transformers>=4.57",
]

[project.scripts]
speekify = "speekify.__main__:main"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/speekify"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".uv-cache",
  ".venv",
  "__pycache__",
]
